# Publica binarios precompilados del bridge en GitHub Releases con cada tag v*.
# El supervisor Python (whatsapp_mcp/bridge.py) los descarga y verifica por SHA256,
# eliminando el requisito de toolchain Go para los usuarios del plugin.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: whatsapp-bridge/go.mod
          cache-dependency-path: whatsapp-bridge/go.sum
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
